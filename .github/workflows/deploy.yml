name: Deploy frontend V2 on port 9999
'on':
  push:
    branches:
      - v2-update

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push V2 image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: fucklrt/234-deploylab-frontend:v2

      - name: Export V2 Image to Tarball
        run: |
          docker pull fucklrt/234-deploylab-frontend:v2
          docker save fucklrt/234-deploylab-frontend:v2 -o frontend-v2.tar
          sudo chmod 644 frontend-v2.tar

      - name: copy files via ssh
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{secrets.HOST_SERVER}}
          username: ${{ secrets.HOST_USER_NAME }}
          key: ${{ secrets.HOST_SSH_PRIVATE_KEY }}
          port: 22
          source: "docker-compose-v2.yml,frontend-v2.tar"
          target: "/root/frontend-v2"

      - name: docker compose deploy V2 on port 9999
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{secrets.HOST_SERVER}}
          username: ${{ secrets.HOST_USER_NAME }}
          key: ${{ secrets.HOST_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /root/frontend-v2

            # 只装独立版 docker-compose（从 Ubuntu 源，阿里云镜像可访问）
            apt-get update && apt-get install docker-compose -y

            docker load -i frontend-v2.tar
            docker-compose -f docker-compose-v2.yml down || true
            docker-compose -f docker-compose-v2.yml up -d
