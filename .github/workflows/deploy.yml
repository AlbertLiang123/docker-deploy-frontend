name: Deploy frontend application

'on':
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: prepare the docker-compose run
        run: |
          ls -l

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # 请确认这里的用户名 fucklrt 是你正确的 Docker Hub ID
          tags: fucklrt/234-deploylab-frontend:latest 

      - name: Export Image to Tarball
        run: |
          docker pull fucklrt/234-deploylab-frontend:latest
          docker save fucklrt/234-deploylab-frontend:latest -o frontend.tar

      - name: copy files via ssh
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST_SERVER }}
          username: ${{ secrets.HOST_USER_NAME }}
          key: ${{ secrets.HOST_SSH_PRIVATE_KEY }}
          port: 22
          source: "docker-compose.yml,frontend.tar"
          target: "/root/frontend"

      - name: docker compose deploy
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.HOST_SERVER }}
          username: ${{ secrets.HOST_USER_NAME }}
          key: ${{ secrets.HOST_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /root/frontend
            docker load -i frontend.tar
            docker compose down || true
            docker compose up -d || docker-compose up -d