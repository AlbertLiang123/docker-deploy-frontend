name: Deploy frontend application v2
'on':
  push:
    branches:
      - v2-update

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: prepare the docker-compose run
        run: |
          ls -la

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: furklrt/234-deploylab-frontend:v2

      - name: copy docker-compose-v2.yml via ssh
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{secrets.HOST_SERVER}}
          username: ${{ secrets.HOST_USER_NAME }}
          key: ${{ secrets.HOST_SSH_PRIVATE_KEY }}
          port: 22
          source: "docker-compose-v2.yml"
          target: "/root/frontend-v2"

      - name: docker compose v2
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{secrets.HOST_SERVER}}
          username: ${{ secrets.HOST_USER_NAME }}
          key: ${{ secrets.HOST_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /root/frontend-v2
            echo ${{ secrets.DOCKER_HUB_TOKEN }} | docker login --username ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin
            docker compose -f docker-compose-v2.yml down
            docker compose -f docker-compose-v2.yml pull
            docker compose -f docker-compose-v2.yml up -d
            rm -rf /root/frontend-v2
