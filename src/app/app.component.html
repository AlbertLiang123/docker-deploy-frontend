<div class="jumbotron jumbotron-fluid bg-dark text-white">
  <div class="container">
    <h1 class="display-4">Grade Calculator V2</h1>
    <p class="lead">Enter your score to calculate your grade instantly (Version 2.0)</p>
  </div>
</div>
<div class="row mt-4">
  <div class="col-md-6">
      <form class="form-inline">
          <div class="form-group mb-2">
            <label for="staticEmail2" class="sr-only"></label>
            <input type="text" readonly class="form-control-plaintext font-weight-bold" id="staticEmail2" value="Your Score:">
          </div>
          <div class="form-group mx-sm-3 mb-2">
            <label for="score" class="sr-only">Score</label>
            <input [(ngModel)]="score" name="score" type="text" class="form-control" id="score" placeholder="Enter score (0-100)...">
          </div>
          <button type="submit" class="btn btn-success mb-2" (click)="getGrade()">Calculate Grade</button>
        </form>
  </div>
  <div *ngIf="showOutput" class="col-md-6">
    <h4>Your Grade Result:</h4>
    <button type="button" [class]=outputClass>{{grade}}</button>
  </div>
</div>
